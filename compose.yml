name: 6k2-services

services:
  traefik:
    container_name: traefik
    image: traefik:v3
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - certificates:/usr/local/share/traefik/certs
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/etc/traefik:ro

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.6k2.ru`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=admin_auth@file"
    secrets:
      - admins


  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.6k2.ru`)"
      - "traefik.http.routers.portainer.service=portainer-frontend"
      - "traefik.http.services.portainer-frontend.loadbalancer.server.port=9000"


  oss-2021:
    container_name: oss-2021
    image: moujikov/6k2_oss-2021
    restart: unless-stopped
    env_file: .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oss-2021.rule=Host(`2021.oss.6k2.ru`) || Host(`2021.xn--n1aga.xn--62-2lc.xn--p1ai`)"


  oss-2023:
    container_name: oss-2023
    image: moujikov/6k2_oss-2023
    restart: unless-stopped
    env_file: .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oss-2023.rule=Host(`2023.oss.6k2.ru`) || Host(`oss.6k2.ru`) || Host(`2023.xn--n1aga.xn--62-2lc.xn--p1ai`) || Host(`xn--n1aga.xn--62-2lc.xn--p1ai`)"


volumes:
  certificates:
  portainer_data:

secrets:
  admins:
    file: /usr/local/share/traefik/auth/admins
  users:
    file: /usr/local/share/traefik/auth/users
