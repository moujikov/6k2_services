name: 6k2-services

services:
  traefik:
    container_name: traefik
    image: traefik:v3
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    environment:
      - TIMEWEBCLOUD_AUTH_TOKEN_FILE=/run/secrets/timeweb_auth_token
    volumes:
      - certificates:/usr/local/share/traefik/certs
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/etc/traefik:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=admin_auth@file"
      - >
        traefik.http.routers.traefik.rule=
        HostRegexp(`^traefik\.${BASE_DOMAINS}$`)
    secrets:
      - admins
      - timeweb_auth_token


  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.service=portainer-frontend"
      - "traefik.http.services.portainer-frontend.loadbalancer.server.port=9000"
      - >
        traefik.http.routers.portainer.rule=
        HostRegexp(`^portainer\.${BASE_DOMAINS}$`)


  oss-2021:
    container_name: oss-2021
    image: moujikov/6k2_oss-2021
    restart: unless-stopped
    env_file: .env
    labels:
      - "traefik.enable=true"
      - >
        traefik.http.routers.oss-2021.rule=
        HostRegexp(`^2021\.oss\.${BASE_DOMAINS}$`) ||
        Host(`2021.xn--n1aga.xn--62-2lc.xn--p1ai`) ||
        Host(`2021.xn--b1ayja.xn--p1ai`)


  oss-2023:
    container_name: oss-2023
    image: moujikov/6k2_oss-2023
    restart: unless-stopped
    env_file: .env
    labels:
      - "traefik.enable=true"
      - >
        traefik.http.routers.oss-2023.rule=
        HostRegexp(`^oss\.${BASE_DOMAINS}$`) || 
        HostRegexp(`^2023\.oss\.${BASE_DOMAINS}$`) || 
        Host(`xn--n1aga.xn--62-2lc.xn--p1ai`) ||
        Host(`2023.xn--n1aga.xn--62-2lc.xn--p1ai`) || 
        Host(`xn--b1ayja.xn--p1ai`) || 
        Host(`2023.xn--b1ayja.xn--p1ai`)


  osch-2024:
    container_name: osch-2024
    image: moujikov/6k2_osch-2024
    restart: unless-stopped
    env_file: .env
    labels:
      - "traefik.enable=true"
      - > 
        traefik.http.routers.osch-2024.rule=
        HostRegexp(`^2024\.(osch|os4)\.${BASE_DOMAINS}$`) || 
        Host(`2024.xn--n1ags.xn--62-2lc.xn--p1ai`)


  alt-chat:
    container_name: alt-chat
    image: moujikov/6k2_alt-chat
    restart: unless-stopped
    env_file: .env
    labels:
      - "traefik.enable=true"
      - > 
        traefik.http.routers.alt-chat.rule=
        HostRegexp(`^a4\.${BASE_DOMAINS}$`)
    secrets:
      - users

volumes:
  certificates:
  portainer_data:

secrets:
  admins:
    file: /usr/local/share/traefik/auth/admins
  users:
    file: /usr/local/share/traefik/auth/users
  timeweb_auth_token:
    file: /usr/local/share/traefik/auth/timeweb_auth_token
