name: 6k2-services

services:
  traefik:
    container_name: traefik
    image: traefik:v3
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    env_file: .env
    environment:
      TIMEWEBCLOUD_AUTH_TOKEN_FILE: /run/secrets/timeweb_auth_token
    volumes:
      - certificates:/usr/local/share/traefik/certs
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/etc/traefik:ro
    secrets:
      - timeweb_auth_token
    labels:
      traefik.enable: 'true'
      
      traefik.http.routers.traefik-static.service: api@internal
      traefik.http.routers.traefik-static.rule: >
        Host(`traefik.6k2.ru`) && (
        PathPrefix(`/static/`) ||
        PathRegexp(`/manifest\.json$`) || 
        PathRegexp(`/favicon\.(ico|png|svg)$`) )

      traefik.http.routers.traefik.service: api@internal
      traefik.http.routers.traefik.middlewares: ip-whitelist@file, auth@file
      traefik.http.routers.traefik.rule: >
        Host(`traefik.6k2.ru`)
    deploy:
      resources:
        limits:
          memory: 128mb


  authelia:
    container_name: authelia
    image: authelia/authelia:4
    restart: unless-stopped
    user: 1000:1000
    env_file: .env
    environment:
      AUTHELIA_STORAGE_POSTGRES_PASSWORD_FILE: /run/secrets/db_password_authelia
      AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE: /run/secrets/authelia_storage_encryption_key
      AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD_FILE: /run/secrets/lldap_password_authelia
      AUTHELIA_NOTIFIER_SMTP_PASSWORD_FILE: /run/secrets/smtp_password_authelia
      AUTHELIA_SESSION_SECRET_FILE: /run/secrets/authelia_session_secret
      AUTHELIA_SESSION_REDIS_PASSWORD_FILE: /run/secrets/redis_password
      AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE: /run/secrets/authelia_reset_password_secret
    volumes:
      - ./authelia:/config:ro
    secrets:
      - db_password_authelia
      - redis_password
      - lldap_password_authelia
      - smtp_password_authelia
      - authelia_storage_encryption_key
      - authelia_session_secret
      - authelia_reset_password_secret
    expose: [ 80 ]
    labels:
      traefik.enable: 'true'
      traefik.http.routers.authelia.rule: >
        Host(`auth.6k2.ru`) ||
        Host(`xn--c1akhkc.xn--62-2lc.xn--p1ai`) ||
        Host(`xn--c1akhkc.xn--b1ayja.xn--p1ai`)
    depends_on:
      - database
      - redis
      # - lldap
    deploy:
      resources:
        limits:
          memory: 128mb


  lldap:
    container_name: lldap
    image: lldap/lldap:stable-alpine-rootless
    restart: unless-stopped
    env_file:
      - .env
      - /usr/local/share/services/database/auth/lldap_url.env
    environment:
      RUST_LOG: warn
      LLDAP_KEY_SEED_FILE: /run/secrets/lldap_key_seed
      LLDAP_JWT_SECRET_FILE: /run/secrets/lldap_jwt_secret
      LLDAP_LDAP_USER_PASS_FILE: /run/secrets/lldap_password_admin
      LLDAP_LDAP_BASE_DN: dc=6k2,dc=ru
    volumes:
      - ./lldap/lldap_config.toml:/data/lldap_config.toml:ro
    secrets:
      - lldap_key_seed
      - lldap_jwt_secret
      - lldap_password_admin
    expose: [ 17170 ]   # Web front-end 
    labels:
      traefik.enable: 'true'
      traefik.http.routers.lldap.middlewares: ip-whitelist@file
      traefik.http.routers.lldap.rule: >
        Host(`users.6k2.ru`)
    deploy:
      resources:
        limits:
          memory: 128mb


  database:
    container_name: database
    image: postgres:18-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password_postgres
    volumes:
      - ./database/init:/docker-entrypoint-initdb.d
      - database:/var/lib/postgresql
    secrets:
      - db_password_postgres
      - db_password_authelia
      - db_password_lldap
    healthcheck:
      test: pg_isready -U postgres
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
      start_interval: 1s
    deploy:
      resources:
        limits:
          memory: 512mb


  redis:
    container_name: redis
    image: bitnami/redis
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
    volumes:
      - ./redis/overrides.conf:/opt/bitnami/redis/mounted-etc/overrides.conf:ro
      - redis_data:/bitnami/redis/data
    secrets:
      - redis_password
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli --no-auth-warning -a "$$(cat $$REDIS_PASSWORD_FILE)" ping | grep PONG
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
      start_interval: 1s
    deploy:
      resources:
        limits:
          memory: 512mb


  watchtower:
    container_name: watchtower
    image: nickfedor/watchtower
    restart: unless-stopped
    env_file: .env
    environment:
      WATCHTOWER_CLEANUP: true
      WATCHTOWER_POLL_INTERVAL: 60
      WATCHTOWER_LABEL_ENABLE: true
      WATCHTOWER_LOG_LEVEL: warn
    volumes:
      - /root/.docker/config.json:/config.json:ro
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 128mb


  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    expose: [ 9000 ]   # Web front-end 
    labels:
      traefik.enable: 'true'
      traefik.http.routers.portainer.middlewares: ip-whitelist@file
      traefik.http.routers.portainer.rule: >
        Host(`portainer.6k2.ru`)
    deploy:
      resources:
        limits:
          memory: 128mb


  glances:
    container_name: glances
    image: nicolargo/glances:latest
    restart: unless-stopped
    env_file: .env
    environment:
      GLANCES_OPT: -w
    pid: host
    volumes:
      - /:/rootfs:ro
      - database:/database:ro
      - redis_data:/redis_data:ro
      - portainer_data:/portainer_data:ro
      - utility-bills_data:/utility-bills_data:ro
      - ./glances:/etc/glances:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/os-release:/etc/os-release:ro
    expose: [ 61208 ]   # Web front-end 
    labels:
      traefik.enable: 'true'
      traefik.http.routers.glances.middlewares: auth@file
      traefik.http.routers.glances.rule: >
        Host(`glances.6k2.ru`)
    deploy:
      resources:
        limits:
          memory: 256mb


  oss-2021:
    container_name: oss-2021
    image: moujikov/6k2_oss-2021
    restart: unless-stopped
    env_file: .env
    labels:
      traefik.enable: 'true'
      traefik.http.routers.oss-2021.middlewares: auth@file
      traefik.http.routers.oss-2021.rule: >
        Host(`2021.oss.6k2.ru`) || 
        Host(`2021.xn--n1aga.xn--62-2lc.xn--p1ai`) ||
        Host(`2021.xn--b1ayja.xn--p1ai`)
    deploy:
      resources:
        limits:
          memory: 128mb


  oss-2023:
    container_name: oss-2023
    image: moujikov/6k2_oss-2023
    restart: unless-stopped
    env_file: .env
    labels:
      traefik.enable: 'true'
      traefik.http.routers.oss-2023.middlewares: auth@file
      traefik.http.routers.oss-2023.rule: >
        Host(`oss.6k2.ru`) || 
        Host(`2023.oss.6k2.ru`) || 
        Host(`xn--n1aga.xn--62-2lc.xn--p1ai`) ||
        Host(`2023.xn--n1aga.xn--62-2lc.xn--p1ai`) || 
        Host(`xn--b1ayja.xn--p1ai`) || 
        Host(`2023.xn--b1ayja.xn--p1ai`)
    deploy:
      resources:
        limits:
          memory: 128mb


  osch-2024:
    container_name: osch-2024
    image: moujikov/6k2_osch-2024
    restart: unless-stopped
    env_file: .env
    labels:
      traefik.enable: 'true'
      traefik.http.routers.osch-2024.rule: >
        Host(`2024.os4.6k2.ru`) || 
        Host(`2024.xn--n1ags.xn--62-2lc.xn--p1ai`)
    deploy:
      resources:
        limits:
          memory: 128mb


  osch-2025:
    container_name: osch-2025
    image: moujikov/6k2_osch-2025
    restart: unless-stopped
    env_file: .env
    labels:
      traefik.enable: 'true'
      traefik.http.routers.osch-2025.rule: >
        Host(`os4.6k2.ru`) || 
        Host(`2025.os4.6k2.ru`) || 
        Host(`xn--n1ags.xn--62-2lc.xn--p1ai`) ||
        Host(`2025.xn--n1ags.xn--62-2lc.xn--p1ai`)
    deploy:
      resources:
        limits:
          memory: 128mb


  utility-bills:
    container_name: utility-bills
    image: moujikov/6k2_utility-bills
    restart: unless-stopped
    env_file: .env
    volumes:
      - utility-bills_data:/var/app-data
    labels:
      traefik.enable: 'true'
      traefik.http.routers.utility-bills.rule: >
        Host(`bills.6k2.ru`)
    deploy:
      resources:
        limits:
          memory: 256mb


  alt-chat:
    container_name: alt-chat
    image: moujikov/6k2_alt-chat
    restart: unless-stopped
    env_file: .env
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
      traefik.enable: 'true'
      traefik.http.routers.alt-chat.rule: >
        Host(`a4.6k2.ru`)
    deploy:
      resources:
        limits:
          memory: 128mb


volumes:
  certificates:
  database:
  portainer_data:
  redis_data:
  utility-bills_data:


secrets:
  timeweb_auth_token:
    file: /usr/local/share/services/timeweb/auth/token
  db_password_postgres:
    file: /usr/local/share/services/database/auth/postgres_password
  db_password_authelia:
    file: /usr/local/share/services/database/auth/authelia_password
  db_password_lldap:
    file: /usr/local/share/services/database/auth/lldap_password
  redis_password:
    file: /usr/local/share/services/redis/auth/redis_password
  smtp_password_authelia:
    file: /usr/local/share/services/smtp/auth/authelia_password
  authelia_storage_encryption_key:
    file: /usr/local/share/services/authelia/keys/storage_encryption_key
  authelia_session_secret:
    file: /usr/local/share/services/authelia/keys/session_secret
  authelia_reset_password_secret:
    file: /usr/local/share/services/authelia/keys/reset_password_secret
  lldap_key_seed:
    file: /usr/local/share/services/lldap/keys/key_seed
  lldap_jwt_secret:
    file: /usr/local/share/services/lldap/keys/jwt_secret
  lldap_password_admin:
    file: /usr/local/share/services/lldap/auth/admin_password
  lldap_password_authelia:
    file: /usr/local/share/services/lldap/auth/authelia_password
