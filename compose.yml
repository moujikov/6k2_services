name: 6k2-services

services:
  traefik:
    container_name: traefik
    image: traefik:v3
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - certificates:/usr/local/share/traefik/certs
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/etc/traefik:ro
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.6k2.ru`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=admin_auth@file"
    secrets:
      - admins

  oss-2021:
    container_name: oss-2021
    image: moujikov/6k2_oss-2021
    env_file: .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oss-2021.rule=Host(`2021.oss.6k2.ru`)"
    restart: unless-stopped

  oss-2023:
    container_name: oss-2023
    image: moujikov/6k2_oss-2023
    env_file: .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oss-2023.rule=Host(`2023.oss.6k2.ru`)"
      - "traefik.http.routers.oss-2023.rule=Host(`oss.6k2.ru`)"
    restart: unless-stopped

volumes:
  certificates:

secrets:
  admins:
    file: /usr/local/share/traefik/auth/admins
  users:
    file: /usr/local/share/traefik/auth/users
