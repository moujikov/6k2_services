server:
  address: tcp://:8080

authentication_backend:
  file:
    path: /auth/users.yml
    watch: true
    search:
      email: true

storage:
  postgres:
    address: tcp://database:5432
    database: authelia
    username: authelia

access_control:
  default_policy: deny
  rules:
    - domain: '*.6k2.ru'
      policy: one_factor

session:
  inactivity: 5m
  expiration: 1h
  remember_me: 1M
  cookies:
    - domain: 6k2.ru
      authelia_url: https://auth.6k2.ru
      default_redirection_url: https://6k2.ru

notifier:
  smtp:
    startup_check_address: test@6k2.ru
    address: smtp://smtp.yandex.ru:465
    username: andrey.muzhikov@6k2.ru
    sender: ТСЖ «Варшавская 6-2» <no-reply@6k2.ru>
    identifier: 6k2.ru
    subject: '[Authelia] {title}'
