authentication_backend:
  file:
    path: '/auth/users.yml'
    watch: true
    search:
      email: true

storage:
  postgres:
    address: tcp://database:5432
    database: authelia
    username: authelia

access_control:
  default_policy: deny
  rules:
    - domain: '*.6k2.ru'
      policy: one_factor

session:
  inactivity: '5m'
  expiration: '1h'
  remember_me: '1M'
  cookies:
    - domain: '6k2.ru'
      authelia_url: 'https://auth.6k2.ru'
      default_redirection_url: 'https://6k2.ru'
