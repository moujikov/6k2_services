http:

  middlewares:
    auth:
      chain:
        middlewares:
          - authentik

    authelia:
      forwardAuth:
        address: http://authelia:9091/api/authz/forward-auth
        maxResponseBodySize: 4096
        authResponseHeaders: 
          - Remote-User
          - Remote-Groups
          - Remote-Name
          - Remote-Email

    authentik:
      forwardAuth:
        address: http://authentik:9000/outpost.goauthentik.io/auth/traefik
        maxResponseBodySize: 16384
        authResponseHeaders:
          # To allow Bearer auth:
          - Authorization

          # Custom headers to check / display in applications:
          - X-App-User
          - X-App-Groups
          - X-App-User-Email
          - X-App-User-Name
          - X-App-Auth-Token

          # Authentik-specific standard headers:
          # - X-authentik-username
          # - X-authentik-groups
          # - X-authentik-entitlements
          # - X-authentik-email
          # - X-authentik-name
          # - X-authentik-uid

    ip-whitelist:
      ipAllowList:
        sourceRange:
          - 172.18.0.1          # Requests from within Docker network (SRC-NATed by Docker)
          - 93.191.63.222       # Andrey's home
          - 195.208.188.0/24    # Andrey's home

    redirect-var62:
      redirectRegex:
        regex: ^https://(.*\.)?var62\.ru(/?.*)$
        replacement: https://${1}6k2.ru${2}

  routers:
    redirect-var62:
      rule: >
        Host(`var62.ru`) ||
        HostRegexp(`^.*\.var62\.ru$`)
      middlewares: redirect-var62
      service: noop@internal
