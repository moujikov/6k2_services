http:

  middlewares:
    restricted:
      chain:
        middlewares:
          - ip-whitelist
          - admin-auth

    admin-auth:
      digestAuth:
        removeHeader: true
        usersFile: /run/secrets/admins

    user-auth:
      digestAuth:
        removeHeader: true
        usersFile: /run/secrets/users
        
    authelia:
      forwardAuth:
        address: http://authelia:9091/api/authz/forward-auth
        trustForwardHeader: true
        authResponseHeaders: [ Remote-User, Remote-Groups, Remote-Name, Remote-Email ]

    ip-whitelist:
      ipAllowList:
        sourceRange:
          - 93.191.63.222/32
          - 195.208.188.0/24

    redirect-var62:
      redirectRegex:
        regex: ^https://(.*\.)?var62\.ru(/?.*)$
        replacement: https://${1}6k2.ru${2}

  routers:
    redirect-var62:
      rule: >
        Host(`var62.ru`) ||
        HostRegexp(`^.*\.var62\.ru$`)
      middlewares: redirect-var62
      service: noop@internal
